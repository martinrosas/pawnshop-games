name: Update Daily Games

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch games and build HTML
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          DISPLAY_DATE=$(date -u +"%A, %B %-d, %Y")

          python3 << PYEOF
import urllib.request, json, sys
from datetime import datetime

today = "$(date -u +%Y-%m-%d)"

leagues = [
    ("4956", "FIFA World Cup 2026"),
    ("4424", "MLB"),
    ("4411", "WNBA"),
    ("4401", "PGA Tour"),
    ("4686", "LPGA Tour"),
    ("4681", "Wimbledon"),
]

games_html = ""

for league_id, league_name in leagues:
    try:
        url = f"https://www.thesportsdb.com/api/v1/json/123/eventsday.php?d={today}&l={league_id}"
        with urllib.request.urlopen(url, timeout=10) as r:
            data = json.loads(r.read())
        events = data.get("events") or []
        for e in events:
            if e.get("dateEvent") == today:
                home = e.get("strHomeTeam", "")
                away = e.get("strAwayTeam", "")
                raw_time = e.get("strTime", "")
                try:
                    t = datetime.strptime(raw_time[:5], "%H:%M")
                    time_str = t.strftime("%-I:%M %p") + " ET"
                except Exception:
                    time_str = raw_time
                games_html += f"""
          <div class="game">
            <div class="league">{league_name}</div>
            <div class="matchup">{away} vs {home}</div>
            <div class="time">{time_str}</div>
          </div>"""
    except Exception as ex:
        print(f"Could not fetch {league_name}: {ex}", file=sys.stderr)

if not games_html.strip():
    games_html = '<p class="no-games">No major games scheduled today — but Pawn Shop will always have something worth watching.</p>'

html = f"""<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pawn Shop - Today Games</title>
  <style>
    body {{ font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }}
    h1 {{ font-size: 26px; margin-bottom: 4px; }}
    .date {{ color: #888; margin-bottom: 24px; font-size: 15px; }}
    .game {{ padding: 14px 0; border-bottom: 1px solid #eee; }}
    .league {{ font-weight: bold; color: #c0392b; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }}
    .matchup {{ font-size: 20px; font-weight: bold; }}
    .time {{ color: #555; font-size: 14px; margin-top: 4px; }}
    .no-games {{ color: #888; font-size: 17px; }}
  </style>
</head>
<body>
  <h1>Pawn Shop — Games Today</h1>
  <p class="date">{datetime.strptime(today, "%Y-%m-%d").strftime("%A, %B %-d, %Y")}</p>
  {games_html}
</body>
</html>"""

with open("index.html", "w") as f:
    f.write(html)

print("Done — index.html written.")
PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html
          git commit -m "Daily games update $(date -u +%Y-%m-%d)" || echo "No changes"
          git push
