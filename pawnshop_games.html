<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pawn Shop – Today's Games</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
    h1 { font-size: 24px; }
    .game { padding: 12px 0; border-bottom: 1px solid #eee; font-size: 18px; }
    .league { font-weight: bold; color: #888; font-size: 13px; text-transform: uppercase; margin-bottom: 4px; }
    .matchup { font-size: 20px; font-weight: bold; }
    .time { color: #555; font-size: 15px; margin-top: 4px; }
    #date-display { color: #888; margin-bottom: 24px; }
    #no-games { display: none; color: #888; font-size: 18px; }
  </style>
</head>
<body>
  <h1>Pawn Shop — Games Today</h1>
  <div id="date-display"></div>
  <div id="games-list"></div>
  <div id="no-games">No major games scheduled today.</div>

  <script>
    // League IDs for priority sports on TheSportsDB
    const LEAGUES = [
      { id: "4387", name: "NBA" },
      { id: "4424", name: "MLB" },
      { id: "4380", name: "NHL" },
      { id: "4391", name: "NFL" },
      { id: "4346", name: "MLS" }
    ];

    // Get today's date in YYYY-MM-DD format
    const today = new Date();
    const dateStr = today.toISOString().split('T')[0];

    document.getElementById('date-display').textContent = 'Schedule for: ' + today.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

    async function fetchGamesForLeague(leagueId, leagueName) {
      try {
        const res = await fetch(`https://www.thesportsdb.com/api/v1/json/123/eventsday.php?d=${dateStr}&l=${leagueId}`);
        const data = await res.json();
        if (!data.events) return [];
        return data.events
          .filter(e => e.dateEvent === dateStr)
          .map(e => ({
            league: leagueName,
            home: e.strHomeTeam,
            away: e.strAwayTeam,
            time: e.strTime || ''
          }));
      } catch {
        return [];
      }
    }

    async function loadAllGames() {
      const allGames = [];
      for (const league of LEAGUES) {
        const games = await fetchGamesForLeague(league.id, league.name);
        allGames.push(...games);
      }

      const container = document.getElementById('games-list');
      if (allGames.length === 0) {
        document.getElementById('no-games').style.display = 'block';
        return;
      }

      allGames.forEach(game => {
        const div = document.createElement('div');
        div.className = 'game';
        // Convert time from 24h to 12h PT
        let timeDisplay = '';
        if (game.time) {
          const [h, m] = game.time.split(':').map(Number);
          const period = h >= 12 ? 'PM' : 'AM';
          const hour = h % 12 || 12;
          timeDisplay = `${hour}:${String(m).padStart(2,'0')} ${period} ET`;
        }
        div.innerHTML = `
          <div class="league">${game.league}</div>
          <div class="matchup">${game.away} vs ${game.home}</div>
          ${timeDisplay ? `<div class="time">${timeDisplay}</div>` : ''}
        `;
        container.appendChild(div);
      });
    }

    loadAllGames();
  </script>
</body>
</html>
